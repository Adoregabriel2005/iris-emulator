<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="black" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
  <!-- Corpo do controle Jaguar: formato trapezoidal característico -->
  <path d="M2 8 L4 5 L16 5 L18 8 L18 15 L2 15 Z"/>
  <!-- Slot do cartucho no topo -->
  <rect x="7" y="3" width="6" height="3" rx="0.5"/>
  <!-- D-pad (cruz) lado esquerdo -->
  <line x1="4.5" y1="9.5" x2="7" y2="9.5"/>
  <line x1="5.75" y1="8.3" x2="5.75" y2="10.7"/>
  <!-- 3 botões de ação (A B C) lado direito -->
  <circle cx="13"  cy="8.8" r="0.75" fill="black" stroke="none"/>
  <circle cx="14.8" cy="8.8" r="0.75" fill="black" stroke="none"/>
  <circle cx="16"  cy="8.8" r="0.75" fill="black" stroke="none"/>
  <!-- Numpad 3x4 característico do Jaguar (simplificado como grade) -->
  <rect x="7.5" y="11" width="5" height="3" rx="0.4"/>
  <line x1="9.2"  y1="11" x2="9.2"  y2="14"/>
  <line x1="10.8" y1="11" x2="10.8" y2="14"/>
  <line x1="7.5"  y1="12" x2="12.5" y2="12"/>
  <line x1="7.5"  y1="13" x2="12.5" y2="13"/>
  <!-- Botão Pause/Option centro-topo -->
  <circle cx="10" cy="9.5" r="0.6" fill="black" stroke="none"/>
</svg>
