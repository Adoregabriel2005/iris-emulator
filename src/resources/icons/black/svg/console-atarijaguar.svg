<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="none" stroke="black" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
  <!-- Atari Jaguar - console body -->
  <rect x="3" y="6" width="14" height="9" rx="2" ry="2"/>
  <!-- Cartridge slot on top -->
  <rect x="7" y="3" width="6" height="4" rx="1" ry="1"/>
  <!-- D-pad left side -->
  <line x1="5" y1="10" x2="7" y2="10"/>
  <line x1="6" y1="9" x2="6" y2="11"/>
  <!-- Buttons right side -->
  <circle cx="13" cy="9.5" r="0.8" fill="black" stroke="none"/>
  <circle cx="15" cy="9.5" r="0.8" fill="black" stroke="none"/>
  <!-- Pause button center -->
  <circle cx="10" cy="10" r="0.7" fill="black" stroke="none"/>
</svg>
